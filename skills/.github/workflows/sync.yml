name: Sync Confluence page
on:
  workflow_dispatch:
    inputs:
      page_id:
        required: true
      page_title:
        required: true
      space_key:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/sync-page.js
        env:
          PAGE_ID: ${{ github.event.inputs.page_id }}
          PAGE_TITLE: ${{ github.event.inputs.page_title }}
          CONFLUENCE_DOMAIN: quickbase.atlassian.net
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: Hankh005/Test-2
